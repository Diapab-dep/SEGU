name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: deprisa
          POSTGRES_PASSWORD: deprisa
          POSTGRES_DB: deprisacheck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://deprisa:deprisa@localhost:5432/deprisacheck_test
        run: npx prisma migrate deploy

      - name: Seed database
        env:
          DATABASE_URL: postgresql://deprisa:deprisa@localhost:5432/deprisacheck_test
        run: npm run db:seed

      - name: Setup integration tests
        env:
          DATABASE_URL: postgresql://deprisa:deprisa@localhost:5432/deprisacheck_test
        run: npx ts-node tests/setup-integration.ts

      - name: Run unit tests
        run: npm test -- --testPathIgnorePattern=integration --passWithNoTests

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://deprisa:deprisa@localhost:5432/deprisacheck_test
        run: npm run test:integration

      - name: Build
        run: npm run build
