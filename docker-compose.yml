version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: deprisacheck-nginx
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - app
    restart: unless-stopped
    command: sh -c "if [ ! -f /etc/nginx/certs/cert.pem ]; then apk add --no-cache openssl && openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/certs/key.pem -out /etc/nginx/certs/cert.pem -subj '/CN=deprisacheck' && echo 'Cert OK'; fi && nginx -g 'daemon off;'"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: deprisacheck:latest
    container_name: deprisacheck-app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_URL: ${FRONTEND_URL:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: deprisacheck-db
    environment:
      POSTGRES_USER: deprisa
      POSTGRES_PASSWORD: deprisa
      POSTGRES_DB: deprisacheck
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U deprisa -d deprisacheck']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  nginx_certs:
